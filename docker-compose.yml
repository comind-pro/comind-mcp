services:
  postgres:
    image: postgres:16-alpine
    container_name: comind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-comind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comind}
      POSTGRES_DB: ${POSTGRES_DB:-comind}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - comind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comind}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  comind_pgdata:

name: Release

# Tag a version (e.g. `git tag v0.2.0 && git push origin v0.2.0`) to build & push
# the OCI image to GHCR and publish server.json to the official MCP Registry.
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push image to GHCR
      id-token: write # OIDC auth to the MCP registry (io.github.* namespace)

    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/comind-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
            ${{ env.IMAGE }}:latest

      # Pin server.json to the tagged version (name/version + the OCI package).
      - name: Stamp version into server.json
        run: |
          V='${{ steps.v.outputs.version }}'
          jq --arg v "$V" --arg img "${IMAGE}:${V}" \
            '.version=$v | .packages[0].version=$v | .packages[0].identifier=$img' \
            server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

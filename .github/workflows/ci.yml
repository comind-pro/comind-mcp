name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Integration tests are db-guarded; point them at the service below.
      DATABASE_URL: postgres://comind:comind@localhost:5432/comind
      # 'test' lets config use dev-fallback secrets (the fail-fast only trips in
      # real prod/staging environments).
      NODE_ENV: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: comind
          POSTGRES_PASSWORD: comind
          POSTGRES_DB: comind
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U comind"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint + format (biome)
        run: pnpm ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm build
